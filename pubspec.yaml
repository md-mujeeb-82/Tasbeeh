name: tasbeeh
description: Flutter App Project for Smart Tasbeeh Project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.0.0+1

environment:
  sdk: '>=2.18.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  audioplayers: ^6.5.1
  vibration: ^3.1.7
  audio_service: ^0.18.15
  phone_state: ^3.0.1
  permission_handler: ^12.0.1
  flutter_local_notifications: ^20.1.0
  http: ^1.6.0
  intl: ^0.20.2
  nsd: ^4.1.0
  flutter_bluetooth_classic_serial: ^1.3.2
  usb_serial: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/ic_launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/moon.jpg
    - assets/audio/beep.mp3
    - assets/audio/beep100Completed.mp3
    - assets/audio/beepCompleted.mp3
    - assets/audio/silence.mp3
    - assets/audio/speech.mp3
    - assets/audio/speech100Completed.mp3
    - assets/audio/speechCompleted.mp3
    - assets/audio/speechFast.mp3
    - assets/audio/speechFast100Completed.mp3

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
